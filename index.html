<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reservas de Salud</title>

  <!-- Tipografías -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header class="navbar">
    <h1>Centro de Bienestar</h1>
  </header>

  <main class="container">

    <section class="hero">
      <h2>Reserva tu espacio de cuidado</h2>
      <p>Un entorno seguro para tu bienestar físico y emocional</p>
      <button class="btn-primary">Agendar cita</button>
    </section>

    <section class="cards">

      <div class="card">
        <img src="https://via.placeholder.com/300" />
        <h3>Ginecología</h3>
        <span class="tag gyne">Salud física</span>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/300" />
        <h3>Psicología</h3>
        <span class="tag psy">Salud mental</span>
      </div>

    </section>

    <section class="form-section">
      <h2>Agenda tu hora</h2>

      <form class="form">
        <input type="text" placeholder="Nombre">
        <select>
          <option>Especialidad</option>
          <option>Ginecología</option>
          <option>Psicología</option>
        </select>
        <input type="date">
        <input type="time">

        <button class="btn-primary">Confirmar reserva</button>
      </form>
    </section>

  </main>

</body>
</html>
